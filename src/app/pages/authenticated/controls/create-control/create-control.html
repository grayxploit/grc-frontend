<app-page-breadcrumb pageTitle="Control Create" />

<div class="space-y-6">
    <app-card title="Control Create">
        @if(errorMessage) {
        <div
            class="mb-8 p-5 bg-gradient-to-r from-red-50 to-pink-50 border-l-4 border-red-400 text-red-800 rounded-2xl flex items-start shadow-lg animate-in slide-in-from-top-2 duration-300">
            <div class="flex-shrink-0">
                <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center">
                    <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
            <div class="ml-4">
                <h4 class="font-semibold text-red-800">Error Occurred</h4>
                <p class="text-red-700 mt-1">{{ errorMessage }}</p>
            </div>
        </div>
        }
        <form [formGroup]="controlForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Title -->
            <div>
                <label for="title" class="mb-2 block text-sm font-medium text-gray-700">
                    Title <span class="text-red-500">*</span>
                </label>

                <input id="title" type="text" formControlName="title" placeholder="Enter control title"
                    class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" />

                @if (controlForm.get('title')?.touched &&
                controlForm.get('title')?.invalid) {
                <p class="mt-1 text-sm text-red-500">
                    Title is required.
                </p>
                }
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="mb-2 block text-sm font-medium text-gray-700">
                    Description <span class="text-red-500">*</span>
                </label>

                <textarea id="description" rows="5" formControlName="description" placeholder="Enter description"
                    class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary"></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3">
                <button type="button"
                    class="rounded-lg border border-gray-300 px-5 py-2 text-gray-700 hover:bg-gray-100"
                    routerLink="/controls">
                    Cancel
                </button>

                <button type="submit" class="rounded-lg bg-green-500 px-5 py-2 text-white hover:bg-green-600 ">
                    Save
                </button>
            </div>

        </form>
    </app-card>
</div>
