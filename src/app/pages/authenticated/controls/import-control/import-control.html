<app-page-breadcrumb pageTitle="Control Import" />

<div class="space-y-6">
    <app-card title="Control Import">
        <form [formGroup]="importControlForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label for="title" class="mb-2 block text-sm font-medium text-gray-700">
                    File <span class="text-red-500">*</span>
                </label>

                <input id="file" type="file" formControlName="file"
                    class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" />

                @if (importControlForm.get('file')?.touched &&
                importControlForm.get('title')?.invalid) {
                <p class="mt-1 text-sm text-red-500">
                    Title is required.
                </p>
                }
            </div>
            <!-- Buttons -->
            <div class="flex justify-end gap-3">
                <button type="button"
                    class="rounded-lg border border-gray-300 px-5 py-2 text-gray-700 hover:bg-gray-100"
                    routerLink="/controls">
                    Cancel
                </button>

                <button type="submit" class="rounded-lg bg-green-500 px-5 py-2 text-white hover:bg-green-600 ">
                    Save
                </button>
            </div>
        </form>
    </app-card>
</div>
