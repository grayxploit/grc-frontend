<app-page-breadcrumb pageTitle="Controls List" />
<div class="space-y-6">
    <app-card title="Controls List">
        <div
            class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-white/[0.03]">
            <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
                <!-- Table Head -->
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                    <tr>
                        <th scope="col" class="px-6 py-3">ID</th>
                        <th scope="col" class="px-6 py-3">Title</th>
                        <th scope="col" class="px-6 py-3">Description</th>
                        <th scope="col" class="px-6 py-3">Status</th>
                    </tr>
                </thead>

                <!-- Table Body -->
                <tbody>
                    @for (control of controls; track control.id) {
                    <tr class="border-b dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                        <td class="px-6 py-4 text-gray-900 dark:text-white/90">{{ control.id }}</td>
                        <td class="px-6 py-4 text-gray-900 dark:text-white/90">{{ control.title }}</td>
                        <td class="px-6 py-4">{{ control.description }}</td>
                        <td class="px-6 py-4">
                            <span [ngClass]="{
                                'bg-green-100 text-green-800 dark:bg-green-900/20 dark:text-green-500': control.status === 'active',
                                'bg-red-100 text-red-800 dark:bg-red-900/20 dark:text-red-500': control.status === 'inactive',
                                'bg-orange-100 text-orange-800 dark:bg-orange-900/20 dark:text-orange-500': control.status === 'pending',
                                'bg-gray-100 text-gray-800 dark:bg-gray-900/20 dark:text-gray-400': control.status !== 'active' && control.status !== 'inactive' && control.status !== 'pending'
                            }"
                                class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium capitalize">
                                <svg class="w-1.5 h-1.5 fill-current" viewBox="0 0 6 6">
                                    <circle cx="3" cy="3" r="3" />
                                </svg>
                                {{ control.status }}
                            </span>
                        </td>
                    </tr>
                    }


                </tbody>
            </table>
        </div>
    </app-card>
</div>
