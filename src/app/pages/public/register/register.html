<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-[#040d1a] via-[#071428] to-[#0a1a35]">
    <!-- Card -->
    <div class="relative w-full max-w-md mx-4 rounded-2xl border border-blue-500/20 bg-[#0d1b2e]/80 backdrop-blur-xl shadow-2xl shadow-blue-950/60 px-10 py-10">
        <!-- Subtle glow border effect -->
        <div class="pointer-events-none absolute inset-0 rounded-2xl ring-1 ring-inset ring-blue-400/10"></div>
        <!-- Logo -->
      <div class="flex justify-center mb-6">
          <app-logo
              [withText]="false"
               [glow]="false"
  
              [size]="64">
             
  
          </app-logo>
      </div>
    </div>
</div>
