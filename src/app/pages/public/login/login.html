<!-- login.component.html -->
<div class="relative min-h-screen flex items-center justify-center overflow-hidden login-shell">

  <!-- Ambient grid + glow backdrop -->
  <div class="pointer-events-none absolute inset-0 opacity-[0.07] login-grid"
       style="background-image: linear-gradient(#4ddba0 1px, transparent 1px), linear-gradient(90deg, #4ddba0 1px, transparent 1px); background-size: 42px 42px;">
  </div>
  <div class="pointer-events-none absolute -top-40 left-1/2 -translate-x-1/2 h-96 w-[36rem] rounded-full bg-[#ff8a3d]/10 blur-[120px]"></div>
  <div class="pointer-events-none absolute bottom-0 right-0 h-72 w-72 rounded-full bg-[#4ddba0]/10 blur-[100px]"></div>

  <!-- Terminal-style card -->
  <div class="relative w-full max-w-md mx-4 rounded-lg border border-slate-200/70 bg-white/85 backdrop-blur-xl shadow-2xl shadow-slate-900/10 overflow-hidden dark:border-[#232b2e] dark:bg-[#0e1315]/90 dark:shadow-black/60 login-card">

    <!-- Window chrome bar -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200/70 dark:border-[#232b2e] login-header-bar">
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-[#ff5f57]/70"></span>
        <span class="h-2.5 w-2.5 rounded-full bg-[#febc2e]/70"></span>
        <span class="h-2.5 w-2.5 rounded-full bg-[#28c840]/70"></span>
      </div>
      <span class="font-mono text-[11px] tracking-widest text-[#5b6b66] uppercase">auth · session_new</span>
      <span class="w-10"></span>
    </div>

    <div class="px-8 py-9">

      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <app-logo
          [withText]="false"
          [glow]="false"
          [size]="56">
        </app-logo>
      </div>

      <!-- Heading, terminal-prompt style -->
      <h1 class="text-center font-mono text-xl font-semibold text-slate-900 mb-1 tracking-tight dark:text-[#e8ecea]">
        <span class="text-[#4ddba0]">$</span> login
        <span class="inline-block w-[2px] h-4 bg-[#ff8a3d] align-middle ml-1 animate-[blink_1.1s_steps(1)_infinite]"></span>
      </h1>
      <p class="text-center text-sm text-slate-600 mb-8 font-mono dark:text-[#7c8a86]">
        authenticate to access <span class="text-slate-800 dark:text-[#9fb0ab]">{{ applicationName }}</span>
      </p>

      <!-- Error message -->
      <div
        *ngIf="errorMessage"
        class="mb-5 flex items-center gap-2 rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 font-mono dark:border-[#ff5f57]/30 dark:bg-[#ff5f57]/10 dark:text-[#ff8f89]"
        role="alert"
      >
        <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <div class="mb-5">
          <label for="email" class="block font-mono text-[11px] uppercase tracking-widest text-slate-500 mb-2 dark:text-[#5b6b66]">user_email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 pointer-events-none dark:text-[#4a5854]">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <input
              id="email"
              type="email"
              name="email"
              formControlName="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="w-full rounded-md border border-slate-200 bg-white py-3 pl-11 pr-4
                     font-mono text-sm text-slate-900 placeholder-slate-400
                     outline-none ring-0
                     transition duration-150
                     focus:border-[#ff8a3d]/60 focus:ring-1 focus:ring-[#ff8a3d]/30
                     hover:border-slate-300
                     dark:border-[#232b2e] dark:bg-[#0e1315] dark:text-[#e8ecea] dark:placeholder-[#3f4a47] dark:hover:border-[#3a4643]"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="mb-7">
          <label for="password" class="block font-mono text-[11px] uppercase tracking-widest text-slate-500 mb-2 dark:text-[#5b6b66]">passphrase</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 pointer-events-none dark:text-[#4a5854]">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              class="w-full rounded-md border border-slate-200 bg-white py-3 pl-11 pr-12
                     font-mono text-sm text-slate-900 placeholder-slate-400
                     outline-none ring-0
                     transition duration-150
                     focus:border-[#ff8a3d]/60 focus:ring-1 focus:ring-[#ff8a3d]/30
                     hover:border-slate-300
                     dark:border-[#232b2e] dark:bg-[#0e1315] dark:text-[#e8ecea] dark:placeholder-[#3f4a47] dark:hover:border-[#3a4643]"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors dark:text-[#4a5854] dark:hover:text-[#9fb0ab]"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              <svg *ngIf="!showPassword" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="relative w-full rounded-md py-3.5 font-mono text-sm font-semibold text-[#0a0e13]
                 bg-gradient-to-r from-[#ff8a3d] to-[#ffb347]
                 hover:from-[#ff9950] hover:to-[#ffc266]
                 active:scale-[0.98]
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition-all duration-200 ease-in-out
                 shadow-lg shadow-[#ff8a3d]/20
                 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#ff8a3d]"
        >
          <span *ngIf="!isSubmitting">authenticate →</span>
          <span *ngIf="isSubmitting" class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            verifying…
          </span>
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-5">
        <button
          type="button"
          (click)="useDemoCredentials()"
          class="w-full text-left rounded-md border border-dashed border-slate-200 bg-slate-50 px-5 py-4
                 hover:border-[#4ddba0]/40 hover:bg-slate-100
                 transition duration-150 group
                 dark:border-[#2c3634] dark:bg-[#0e1315] dark:hover:bg-[#101917]"
        >
          <span class="flex items-center gap-2 font-mono text-sm font-medium text-[#4ddba0] group-hover:text-[#6ce4b8] transition-colors">
            <span class="text-slate-500 dark:text-[#5b6b66]">#</span> use demo credentials
          </span>
          <span class="mt-1 block font-mono text-xs text-slate-500 dark:text-[#5b6b66]">
            demo&#64;grayxploit.io · Demo1234!
          </span>
        </button>
      </div>

      <!-- Create Account -->
      <p class="mt-6 text-center font-mono text-xs text-slate-500 dark:text-[#5b6b66]">
        no account?
        <button
          type="button"
          (click)="onCreateAccount()"
          class="ml-1 text-[#ff8a3d] hover:text-[#ffb347] transition-colors font-medium"
        >
          create one →
        </button>
      </p>

    </div>
  </div>
</div>

<style>
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
</style>
