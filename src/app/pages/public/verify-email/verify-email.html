<div class="relative min-h-screen flex items-center justify-center overflow-hidden auth-shell pt-16 py-10">
    <!-- Terminal-style card -->
    <div class="relative w-full max-w-md mx-4 rounded-lg border border-slate-200/70 bg-white/85 backdrop-blur-xl shadow-2xl shadow-slate-900/10 overflow-hidden dark:border-[#232b2e] dark:bg-[#0e1315]/90 dark:shadow-black/60 auth-card">
         <!-- Window chrome bar -->
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200/70 dark:border-[#232b2e] auth-header-bar">
            <div class="flex items-center gap-2">
                <span class="h-2.5 w-2.5 rounded-full bg-[#ff5f57]/70"></span>
                <span class="h-2.5 w-2.5 rounded-full bg-[#febc2e]/70"></span>
                <span class="h-2.5 w-2.5 rounded-full bg-[#28c840]/70"></span>
            </div>
            <span class="font-mono text-[11px] tracking-widest text-[#5b6b66] uppercase">email - verify</span>
            <span class="w-10"></span>
        </div>
         <div class="px-8 py-9">
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <app-logo
                [withText]="false"
                [glow]="false"
                [size]="56">
                </app-logo>
            </div>
             <!-- Heading, terminal-prompt style -->
            <h1 class="text-center font-mono text-xl font-semibold text-slate-900 mb-1 tracking-tight dark:text-[#e8ecea]">
                <span class="text-[#4ddba0]">$</span> Verify your email address
                <span class="inline-block w-[2px] h-4 bg-[#ff8a3d] align-middle ml-1 animate-[blink_1.1s_steps(1)_infinite]"></span>
            </h1>
            @if(isVerifying()) {
                <div class="flex justify-center my-6">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-[#4ddba0] animate-pulse"></span>
                        <span class="w-2 h-2 rounded-full bg-[#4ddba0] animate-pulse" style="animation-delay: 0.2s;"></span>
                        <span class="w-2 h-2 rounded-full bg-[#4ddba0] animate-pulse" style="animation-delay: 0.4s;"></span>
                    </div>
                </div>
                <p class="text-center font-mono text-sm text-slate-600 dark:text-[#a8afa8]">Verifying...</p>
            }

            @if (errorMessage() && !activeUserError()) {
                <p class="text-center font-mono text-sm text-red-500 dark:text-red-400 mt-6">{{ errorMessage() }}</p>
            }

            @if (activeUserError()) {
                <p class="text-center font-mono text-sm text-yellow-500 dark:text-yellow-400 mt-6">{{ activeUserError() }}</p>
                <div class="flex justify-center mt-4">
                    <button class="mt-2 w-full rounded-md py-3 font-mono text-sm font-semibold text-[#0a0e13]
                 bg-gradient-to-r from-[#ff8a3d] to-[#ffb347]
                 hover:from-[#ff9950] hover:to-[#ffc266]
                 active:scale-[0.98]
                 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:from-[#ff8a3d] disabled:hover:to-[#ffb347]
                 transition-all duration-200 ease-in-out
                 shadow-lg shadow-[#ff8a3d]/20
                 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#ff8a3d]" (click)="goToLogin()">
                        go to login
                    </button>
                </div>
            }
         </div>
    </div>
</div>
