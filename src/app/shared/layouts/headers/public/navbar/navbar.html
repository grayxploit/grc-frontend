<header
  [class]="
    'fixed left-0 right-0 top-0 z-50 transition-all duration-300 ' +
    (scrolled
      ? 'border-b border-gray-200/80 bg-white/80 backdrop-blur-xl dark:border-white/10 dark:bg-[#060912]/80'
      : 'border-b border-transparent')
  "
>
  <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">

    <!-- Logo -->
    <a [routerLink]="['/']" class="text-gray-900 text-xl font-bold dark:text-white">
      <app-logo
        [size]="48"
        tagline="CyberControl"
        [glow]="true"
        [withText]="true"
        [href]="null">
      </app-logo>
    </a>

    <!-- Desktop Menu -->
    <div class="hidden md:flex items-center gap-1">
      <a
        *ngFor="let link of links"
        [routerLink]="link.href"
        class="relative rounded-lg px-3.5 py-2 text-sm font-medium transition-colors"
        [ngClass]="
          isActive(link.href)
            ? 'text-gray-900 dark:text-white'
            : 'text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white'
        "
      >
        <span
          *ngIf="isActive(link.href)"
          class="absolute inset-0 -z-10 rounded-lg border border-gray-200 bg-gray-100 dark:border-white/10 dark:bg-white/5"
        ></span>

        {{ link.label }}
      </a>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-2">
       <app-theme-toggle />
      <!-- Authenticated User -->
      <div *ngIf="authed" class="relative hidden sm:block user-menu">
        <button
          (click)="toggleUserMenu()"
          class="flex items-center gap-2 rounded-lg border border-gray-200 bg-gray-100 px-2 py-1.5 text-sm text-gray-900 dark:border-white/10 dark:bg-white/5 dark:text-white"
        >
          <span
            class="flex h-7 w-7 items-center justify-center rounded-full bg-blue-600 text-xs font-bold text-white"
          >
            {{ initials }}
          </span>

          <span class="max-w-[120px] truncate">
            {{ user.name }}
          </span>

          ▼
        </button>

        <div
          *ngIf="menuOpen"
          class="absolute right-0 mt-2 w-52 overflow-hidden rounded-xl border border-gray-200 bg-white/95 shadow-2xl dark:border-white/10 dark:bg-[#0a0f1d]/95"
        >
          <div class="border-b border-gray-200 px-4 py-3 dark:border-white/10">
            <p class="truncate text-sm font-medium text-gray-900 dark:text-white">
              {{ user.name }}
            </p>
            <p class="truncate text-xs text-gray-500">
              {{ user.email }}
            </p>
          </div>

          <a
            [routerLink]="['/dashboard']"
            class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/5"
          >
            Dashboard
          </a>

          <a
            [routerLink]="['/dashboard/bookmarks']"
            class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/5"
          >
            My Workspace
          </a>

          <button
            (click)="logout()"
            class="w-full border-t border-gray-200 px-4 py-2.5 text-left text-sm text-red-600 hover:bg-red-50 dark:border-white/10 dark:text-red-300 dark:hover:bg-red-500/10"
          >
            Sign out
          </button>
        </div>
      </div>

      <!-- Guest -->
      <ng-container *ngIf="!authed">
        <a
          [routerLink]="['/login']"
          class="hidden sm:block rounded-lg px-3.5 py-2 text-sm text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-white"
        >
          Sign in
        </a>

        <a
          [routerLink]="['/register']"
          class="hidden sm:block rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 px-4 py-2 text-sm font-semibold text-white"
        >
          Get Started
        </a>
      </ng-container>

      <!-- Mobile Toggle -->
      <button
        (click)="toggleMobileMenu()"
        class="flex h-9 w-9 items-center justify-center rounded-lg border border-gray-200 bg-gray-100 text-gray-900 md:hidden dark:border-white/10 dark:bg-white/5 dark:text-white"
      >
        {{ open ? '✕' : '☰' }}
      </button>

    </div>
  </nav>

  <!-- Mobile Menu -->
  <div
    *ngIf="open"
    class="border-t border-gray-200 bg-white/95 backdrop-blur-xl md:hidden dark:border-white/10 dark:bg-[#060912]/95"
  >
    <div class="flex flex-col gap-1 px-4 py-3">

      <a
        *ngFor="let link of links"
        [routerLink]="link.href"
        class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/5"
      >
        {{ link.label }}
      </a>

      <div class="mt-2 flex gap-2 border-t border-gray-200 pt-3 dark:border-white/10">

        <button
          *ngIf="authed"
          (click)="logout()"
          class="flex-1 rounded-lg border border-red-500/30 bg-red-500/10 px-3 py-2 text-red-600 dark:text-red-300"
        >
          Sign out
        </button>

        <ng-container *ngIf="!authed">
          <a
            [routerLink]="['/login']"
            class="flex-1 rounded-lg border border-gray-200 px-3 py-2 text-center text-gray-900 dark:border-white/10 dark:text-white"
          >
            Sign in
          </a>

          <a
            [routerLink]="['/register']"
            class="flex-1 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 px-3 py-2 text-center text-white"
          >
            Get Started
          </a>
        </ng-container>

      </div>
    </div>
  </div>
</header>
